<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - NeuroScan AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4a6fa5;
            --primary-light: #7b9fd3;
            --primary-dark: #2c4979;
            --secondary-color: #5cbdb9;
            --light-accent: #e6f7f6;
            --dark-color: #2c3e50;
            --light-color: #f8f9fa;
            --text-color: #333;
            --text-light: #6c757d;
            --white: #ffffff;
            --success: #4caf50;
            --error: #f44336;
            --gradient: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            --gradient-light: linear-gradient(135deg, rgba(74, 111, 165, 0.1), rgba(92, 189, 185, 0.1));
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --border-radius: 16px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--gradient-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        .container {
            background: var(--white);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            text-align: center;
            box-shadow: var(--shadow);
            width: 420px;
            max-width: 95%;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--gradient);
        }

        /* Fixed home button - correct positioning */
        .home-btn {
            position: absolute;
            top: 1.2rem;
            left: 1.2rem;
            background: var(--light-accent);
            color: var(--primary-color);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            z-index: 10;
        }

        .home-btn:hover {
            background: var(--primary-color);
            color: var(--white);
            transform: translateY(-2px);
        }

        h2 {
            font-family: 'Montserrat', sans-serif;
            margin: 1rem 0 1.5rem;
            color: var(--dark-color);
            font-size: 1.8rem;
            font-weight: 700;
        }

        /* Alert messages */
        .alert {
            padding: 0.85rem 1.2rem;
            border-radius: var(--border-radius);
            margin-bottom: 1.2rem;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .alert.success {
            background: rgba(76, 175, 80, 0.1);
            color: var(--success);
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .alert.error {
            background: rgba(244, 67, 54, 0.1);
            color: var(--error);
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        /* Form Fields */
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.95rem 1.2rem;
            border: 2px solid #e9ecef;
            border-radius: var(--border-radius);
            outline: none;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            background: var(--light-color);
            color: var(--text-color);
            transition: var(--transition);
        }

        input:focus, textarea:focus {
            border-color: var(--primary-color);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.1);
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-light);
        }

        textarea {
            height: 120px;
            resize: none;
        }

        button[type="submit"] {
            width: 100%;
            padding: 1rem;
            border: none;
            background: var(--gradient);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: var(--border-radius);
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 4px 15px rgba(74, 111, 165, 0.3);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 111, 165, 0.4);
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
            }

            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Fixed: correct absolute positioning, removed broken margin-left -->
        <button class="home-btn" onclick="window.location.href='/';">
            <i class="fas fa-home"></i>
        </button>

        <h2>Contact Us</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form action="https://formspree.io/f/mpwqveaz" method="POST">
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">
                <i class="fas fa-paper-plane"></i> Send Message
            </button>
        </form>
    </div>
</body>
</html>
